{% extends "base.html" %}
{% block title %}轻量位置感 · GL-2{% endblock %}
{% block body %}
<section>
  <h1>轻量位置感（GL-2）</h1>
  <p class="box">{{ gs.position_hint }}</p>
  <p>可选 1 道探针题（可跳过）：</p>
  <p><strong>{{ gs.probe_question }}</strong></p>
  <form method="post">
    <label for="probe_answer">你的回答（可选）</label>
    <textarea id="probe_answer" name="probe_answer" rows="3"></textarea>
    <div class="row">
      <button type="submit" name="action" value="answer">提交探针</button>
      <button type="submit" name="action" value="skip" class="secondary">跳过探针</button>
    </div>
  </form>
</section>
{% endblock %}
