<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}LeapMa{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='app.css') }}">
</head>
<body>
  <header class="top">
    <a class="brand" href="{{ url_for('growth.home') }}">LeapMa</a>
    <nav class="nav" aria-label="主导航">
      <a href="{{ url_for('growth.dashboard') }}" class="{% if request.endpoint == 'growth.dashboard' %}is-active{% endif %}">Dashboard</a>
      <a href="{{ url_for('growth.track_home') }}" class="{% if request.endpoint and 'track' in request.endpoint %}is-active{% endif %}">开始练</a>
      {% if logged_in %}
      <form class="nav-auth" method="post" action="{{ url_for('growth.logout') }}">
        <button type="submit" class="nav-linkish">退出</button>
      </form>
      {% else %}
      <a href="{{ url_for('growth.login') }}">登录</a>
      {% endif %}
      <span class="nav-guest">{{ guest_label }}</span>
    </nav>
  </header>
  <main class="wrap {% block wrap_class %}{% endblock %}">
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <ul class="flash">{% for m in messages %}<li>{{ m }}</li>{% endfor %}</ul>
      {% endif %}
    {% endwith %}
    {% block body %}{% endblock %}
  </main>
  <footer class="foot">成长先于变现 · 禁止问卷墙 · 初期 Python · 判定反馈优先</footer>
</body>
</html>
