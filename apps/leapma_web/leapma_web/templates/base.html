<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}LeapMa{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='app.css') }}">
</head>
<body>
  <header class="top">
    <a class="brand" href="{{ url_for('growth.home') }}">LeapMa</a>
    <span class="tag">SPEC-GL-001 · 免费成长闭环</span>
  </header>
  <main class="wrap">
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <ul class="flash">{% for m in messages %}<li>{{ m }}</li>{% endfor %}</ul>
      {% endif %}
    {% endwith %}
    {% block body %}{% endblock %}
  </main>
  <footer class="foot">Growth Before Monetization · Hard No: 课平台/社区/招聘/IDE/代写主价值/复杂游戏</footer>
</body>
</html>
