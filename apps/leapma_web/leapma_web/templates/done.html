{% extends "base.html" %}
{% block title %}闭环完成{% endblock %}
{% block body %}
<section class="panel">
  <p class="coach-label">完成</p>
  <h1>最小成长闭环已跑通</h1>
  <p class="badge ok">未付费路径可完成 · 无付费墙</p>
  <h2>你能复述的下一步（曾）</h2>
  <p class="box soft">{{ gs.next_step }}</p>
  <h2>你指出的进展</h2>
  <p class="box soft">{{ gs.progress_note }}</p>
  <h2>为何再来</h2>
  <p class="box highlight">{{ gs.next_intent }}</p>
  <div class="btn-row">
    <a class="btn" href="{{ url_for('growth.dashboard') }}">回 Dashboard</a>
    <form method="post" action="{{ url_for('growth.start') }}">
      <button type="submit" class="secondary">再开一轮</button>
    </form>
  </div>
</section>
{% endblock %}
