{% extends "base.html" %}
{% block title %}AI 反馈 · GL-5{% endblock %}
{% block body %}
<section class="panel">
  <p class="coach-label">反馈</p>
  <h1>可信反馈</h1>
  {% if gs.feedback_uncertain %}
    <p class="badge warn">uncertain = true（坦诚边界）</p>
  {% endif %}
  {% if gs.feedback_rejected_codegen %}
    <p class="badge warn">已拒绝：代写整项目主价值</p>
  {% endif %}
  <pre class="box highlight">{{ gs.feedback_body }}</pre>
  <p><a class="btn" href="{{ url_for('growth.progress') }}">回顾进展</a></p>
</section>
{% endblock %}
