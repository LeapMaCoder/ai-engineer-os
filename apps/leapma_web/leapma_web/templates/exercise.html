{% extends "base.html" %}
{% block title %}短练习 · GL-4{% endblock %}
{% block body %}
<section class="panel">
  <p class="coach-label">行动</p>
  <h1>短练习</h1>
  <p class="coach-line">主路径：动手。提问为辅（可写在作答里）。</p>
  <p class="box soft">{{ gs.exercise_prompt }}</p>
  <form method="post">
    <label for="attempt_text">你的作答</label>
    <textarea id="attempt_text" class="code" name="attempt_text" rows="6" required placeholder="写你的理解/步骤/伪代码…"></textarea>
    <label class="check muted">
      <input type="checkbox" name="force_uncertain" value="1">
      演示「不确定」坦诚分支（AC-02）
    </label>
    <button type="submit">Submit · 获取反馈</button>
  </form>
</section>
{% endblock %}
